<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Figure 7 - ShopLite Login and Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/design-preview.css" rel="stylesheet">
  </head>
  <body class="preview-page">
    <header>
      <nav class="navbar shoplite-topbar">
        <div class="container-fluid px-4">
          <a class="shoplite-brand" href="figure-01-home.html"><span class="brand-tile">SL</span><span>ShopLite</span></a>
          <div class="d-flex gap-2"><a class="btn btn-outline-light" href="figure-01-home.html">Back to Store</a><a class="btn btn-accent" href="figure-10-admin-dashboard.html">Admin Preview</a></div>
        </div>
      </nav>
    </header>

    <main class="auth-shell">
      <div class="container">
        <div class="text-center text-white mb-4">
          <p class="eyebrow">Account access</p>
          <h1 class="display-6 fw-bold">Login or create a ShopLite account</h1>
          <p class="text-light mb-0">One combined prototype page for customer and admin sign-in flows.</p>
        </div>

        <div class="row g-4 justify-content-center">
          <div class="col-lg-5">
            <section class="auth-card">
              <h2 class="card-heading fs-4 mb-3">Login</h2>
              <form data-prototype-form data-validation-target="#loginMessage">
                <div class="mb-3"><label class="form-label">Email address</label><input class="form-control" type="email" value="student@shoplite.test" required></div>
                <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" value="password123" required></div>
                <div class="mb-3"><label class="form-label">Role hint</label><select class="form-select"><option>Customer user</option><option>Admin user</option></select></div>
                <div class="form-check mb-3"><input class="form-check-input" id="rememberUser" type="checkbox" checked><label class="form-check-label" for="rememberUser">Remember this prototype account</label></div>
                <button class="btn btn-accent w-100" type="submit">Sign In</button>
                <div id="loginMessage" class="validation-message"></div>
              </form>
            </section>
          </div>

          <div class="col-lg-5">
            <section class="auth-card">
              <h2 class="card-heading fs-4 mb-3">Register</h2>
              <form data-prototype-form data-validation-target="#registerMessage">
                <div class="mb-3"><label class="form-label">Full name</label><input class="form-control" type="text" value="Alex Morgan" required></div>
                <div class="mb-3"><label class="form-label">Email address</label><input class="form-control" type="email" value="alex@example.com" required></div>
                <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" value="password123" required></div>
                <div class="mb-3"><label class="form-label">Account type hint</label><select class="form-select"><option>Customer account</option><option>Admin account request</option></select></div>
                <button class="btn btn-outline-accent w-100" type="submit">Create Account</button>
                <div id="registerMessage" class="validation-message"></div>
              </form>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/design-preview.js"></script>
  </body>
</html>
